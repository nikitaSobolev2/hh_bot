services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Defaults are for local dev only — set strong POSTGRES_* in .env on shared or production hosts.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hh_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hh_bot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hh_bot}
    # Bind to loopback only — avoids random internet scanners hitting Postgres with bogus users
    # (FATAL: password authentication failed for user "app"/"user"). Containers use hostname ``postgres``.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hh_bot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # VM / Docker: point REDIS_HOST=redis in .env so bot and Celery use this service,
  # not localhost or an external Redis URL (replicas → ReadOnlyError on writes).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - /usr/local/etc/redis/redis-standalone.conf
      - --replicaof
      - "no"
      - "one"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./config/redis-standalone.conf:/usr/local/etc/redis/redis-standalone.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist Playwright debug screenshots (admin: Debug Playwright Screenshots)
      - ./data/playwright_debug:/app/data/playwright_debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # General tasks only — Playwright runs on ``celery_worker_hh_ui`` (queue ``hh_ui``) so small VMs
    # do not run multiple Chromium instances at once.
    command: celery -A src.worker.app worker --loglevel=info --concurrency=2 -Q celery
    # ``deploy:`` is ignored by ``docker compose up`` (Swarm / ``docker stack deploy`` only).
    # Extra general-queue capacity: ``docker compose up -d --scale celery_worker=2`` (or raise ``--concurrency``).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One Playwright/Chromium at a time per replica (raise CELERY_HH_UI_CONCURRENCY on larger hosts).
  celery_worker_hh_ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/playwright_debug:/app/data/playwright_debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - src.worker.app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_HH_UI_CONCURRENCY:-1}
      - -Q
      - hh_ui
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Single DISPLAY for Playwright headed login; consumes Celery queue login_assist only.
  celery_worker_login_assist:
    build:
      context: .
      dockerfile: Dockerfile
      target: login_assist
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/app/docker/entrypoint-login-assist.sh"]
    command:
      - celery
      - -A
      - src.worker.app
      - worker
      - --loglevel=info
      - --concurrency=1
      - -Q
      - login_assist
    environment:
      DISPLAY: ":99"
      HH_LOGIN_ASSIST_HEADLESS: "false"
    ports:
      - "${LOGIN_ASSIST_NOVNC_PORT:-6080}:6080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data:
  redis_data:
