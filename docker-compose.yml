services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hh_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hh_bot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hh_bot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hh_bot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # VM / Docker: point REDIS_HOST=redis in .env so bot and Celery use this service,
  # not localhost or an external Redis URL (replicas → ReadOnlyError on writes).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - /usr/local/etc/redis/redis-standalone.conf
      - --replicaof
      - "no"
      - "one"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./config/redis-standalone.conf:/usr/local/etc/redis/redis-standalone.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.worker.app worker --loglevel=info --concurrency=2 -Q celery
    deploy:
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Single DISPLAY for Playwright headed login; consumes Celery queue login_assist only.
  celery_worker_login_assist:
    build:
      context: .
      dockerfile: Dockerfile
      target: login_assist
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/app/docker/entrypoint-login-assist.sh"]
    command:
      - celery
      - -A
      - src.worker.app
      - worker
      - --loglevel=info
      - --concurrency=1
      - -Q
      - login_assist
    environment:
      DISPLAY: ":99"
      HH_LOGIN_ASSIST_HEADLESS: "false"
    ports:
      - "${LOGIN_ASSIST_NOVNC_PORT:-6080}:6080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data:
  redis_data:
