# Standalone master for Celery broker + FSM. Replicas are read-only and break workers.
dir /data

# Do not load appendonly.aof from older deployments: it can replay REPLICAOF and
# re-attach this node to an external master (ReadOnlyError from clients).
appendonly no

# Must be last: force master even if anything else tried to enable replication.
replicaof no one
