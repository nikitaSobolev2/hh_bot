# Reference override: dedicated Celery worker for HH login assist (single DISPLAY).
# Usage: docker compose -f docker-compose.yml -f docker-compose.login-assist.example.yml up -d
#
# Before using:
# - Install Xvfb + noVNC stack in the image or mount an entrypoint that starts :99 + x11vnc.
# - Set DISPLAY=:99, HH_LOGIN_ASSIST_HEADLESS=false, HH_LOGIN_ASSIST_ENABLED=true.
# - Point HH_LOGIN_ASSIST_VIEWER_URL at your HTTPS noVNC URL (optional but required for end users).

services:
  celery_worker_login_assist:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DISPLAY: ":99"
      HH_LOGIN_ASSIST_HEADLESS: "false"
      HH_LOGIN_ASSIST_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A src.worker.app worker
      --loglevel=info
      --concurrency=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
